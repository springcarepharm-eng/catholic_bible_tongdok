<style>
  :root{
    --night:#13172a; --night-2:#1b2138; --night-3:#232a45;
    --ink:#ece6d8; --muted:#9aa1bd; --muted-2:#6f7592;
    --gold:#d8b06a; --gold-bright:#e7c684; --gold-soft:rgba(216,176,106,.16);
    --line:rgba(236,230,216,.12); --line-soft:rgba(236,230,216,.07); --radius:16px;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0; background:#0f1322}
  body{font-family:'Noto Sans KR',system-ui,sans-serif; color:var(--ink); line-height:1.6;
    background:radial-gradient(120% 70% at 50% -8%, rgba(216,176,106,.10), transparent 55%),
      linear-gradient(180deg,var(--night),#0f1322); background-attachment:fixed;}
  #app{max-width:1040px; margin:0 auto;
    padding:calc(18px + env(safe-area-inset-top)) 16px calc(48px + env(safe-area-inset-bottom));}
  .eyebrow{font-size:11px; letter-spacing:.26em; text-transform:uppercase; color:var(--gold); font-weight:700; margin:0 0 5px}
  h1{font-family:'Noto Serif KR',serif; font-weight:600; font-size:23px; margin:0 0 14px}

  /* 상단 3칼럼 바 */
  .top-bar{display:grid; grid-template-columns:1fr auto 1fr; gap:14px; margin-bottom:14px; align-items:start}
  .top-center{display:flex; flex-direction:column; align-items:center; gap:10px; min-width:140px}
  .top-actions{display:flex; gap:6px; flex-wrap:wrap; justify-content:center}
  .halo{position:relative; width:80px; height:80px; flex:0 0 auto}
  .halo svg{transform:rotate(-90deg)}
  .halo .c{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
  .halo .c .n{font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600; color:var(--gold-bright); line-height:1}
  .halo .c .d{font-size:9px; color:var(--muted)}
  .top-meta{text-align:center}
  .top-meta .big{font-family:'Noto Serif KR',serif; font-size:16px}
  .top-meta .small{color:var(--muted); font-size:12px; margin-top:2px}
  /* 미니 달력 */
  .mini-cal{background:linear-gradient(180deg,var(--night-2),var(--night-3)); border:1px solid var(--line-soft); border-radius:var(--radius); padding:12px}
  .mini-cal-nav{display:flex; align-items:center; justify-content:space-between; margin-bottom:8px}
  .mini-cal-title{font-size:13px; font-weight:600; font-family:'Noto Serif KR',serif; color:var(--gold)}
  .mini-cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:2px}
  .mch{text-align:center; font-size:10px; color:var(--muted); padding:3px 0; font-weight:600}
  .mcc{min-height:36px; border-radius:6px; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:default; background:rgba(0,0,0,.14); font-size:12px; padding:3px 2px}
  .mref{font-size:8.5px;color:var(--gold);opacity:0.75;line-height:1.3;text-align:center;word-break:keep-all;margin-top:1px}
  .mcc[data-dn]{cursor:pointer; background:rgba(236,230,216,.07)}
  .mcc[data-dn]:hover{background:rgba(236,230,216,.18)}
  .mcc.me{background:transparent!important}
  .mcc.mt{outline:2px solid var(--gold); outline-offset:-2px}
  .mcc.md span.mday{color:var(--gold); font-weight:700}
  .mcc.mm span.mday{color:var(--muted-2)}
  .mchk{font-size:9px; color:var(--gold); line-height:1}
  .mdot{width:5px; height:5px; border-radius:50%; background:#e06060; margin-top:1px}
  /* 우측 인덱스+검색 */
  .top-index{background:linear-gradient(180deg,var(--night-2),var(--night-3)); border:1px solid var(--line-soft); border-radius:var(--radius); padding:12px; display:flex; flex-direction:column; gap:8px}
  .top-index h3{font-family:'Noto Serif KR',serif; font-size:13px; font-weight:600; color:var(--gold); margin:0 0 4px}
  .tidx-book{width:100%; padding:7px 8px; background:rgba(0,0,0,.25); color:var(--fg); border:1px solid rgba(236,230,216,.2); border-radius:8px; font-size:13px; font-family:inherit}
  .tidx-chs{display:flex; flex-wrap:wrap; gap:3px; max-height:120px; overflow-y:auto}
  .tidx-ch{min-width:30px; height:30px; font-size:12px; padding:0 4px; border-radius:7px}
  .tidx-ch.sel{background:var(--gold)!important; color:#1a1710!important; border-color:var(--gold)!important}
  .srch-input{width:100%; padding:8px 10px; background:rgba(0,0,0,.25); color:var(--fg); border:1px solid rgba(236,230,216,.2); border-radius:8px; font-size:13px; font-family:inherit; box-sizing:border-box}
  .srch-input:focus{outline:none; border-color:var(--gold)}
  .srch-results{display:flex; flex-direction:column; gap:4px; max-height:180px; overflow-y:auto}
  .srch-hit{padding:7px 9px; border-radius:8px; background:rgba(0,0,0,.2); border:1px solid var(--line-soft); cursor:pointer; font-size:12px}
  .srch-hit:hover{background:rgba(236,230,216,.08)}
  .srch-ref{font-size:11px; color:var(--gold); font-weight:700; margin-bottom:2px}
  .srch-txt{color:var(--muted); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; line-height:1.5}
  /* 인덱스 페이지 */
  .idx-ch-sel{background:var(--gold)!important; color:#1a1710!important}

  .btn{font-family:inherit; font-size:13px; font-weight:500; cursor:pointer; border-radius:10px;
    padding:9px 13px; border:1px solid var(--line); background:rgba(255,255,255,.03); color:var(--ink); transition:.16s; white-space:nowrap}
  .btn:active{background:rgba(255,255,255,.1)}
  .btn:focus-visible{outline:2px solid var(--gold); outline-offset:2px}
  .btn-gold{background:var(--gold); color:#221a09; border-color:var(--gold); font-weight:700}
  .btn-ghost{background:transparent}
  .btn[disabled]{opacity:.4}
  .btn-sm{padding:6px 10px; font-size:12px}

  .navrow{display:flex; gap:8px; align-items:center; margin-bottom:14px}
  .navrow .daytag{font-family:'Cormorant Garamond',serif; color:var(--gold); font-size:15px; letter-spacing:.04em; margin-right:auto}
  .done-pill{display:inline-flex; gap:5px; font-size:11px; color:#7fd8a0; background:rgba(127,216,160,.1); border:1px solid rgba(127,216,160,.25); padding:3px 9px; border-radius:999px}

  .grid{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .col{display:flex; flex-direction:column; gap:14px; min-width:0}
  .panel{background:linear-gradient(180deg,var(--night-2),var(--night-3)); border:1px solid var(--line); border-radius:var(--radius); padding:16px; position:relative}
  .panel::before{content:""; position:absolute; left:0; top:14px; bottom:14px; width:3px; background:linear-gradient(var(--gold),transparent); border-radius:3px}
  .panel h3{font-family:'Noto Serif KR',serif; font-size:14px; font-weight:600; margin:0 0 10px; padding-left:8px; display:flex; align-items:center; gap:8px}
  .panel h3 .tag{font-size:10px; color:var(--gold); border:1px solid var(--gold-soft); padding:2px 7px; border-radius:999px; font-weight:500; letter-spacing:.04em}
  .reading-title{font-family:'Noto Serif KR',serif; font-size:19px; font-weight:500; padding-left:8px; margin:0 0 8px}

  .passage{padding-left:8px; max-height:48vh; overflow:auto; padding-right:6px; -webkit-overflow-scrolling:touch}
  .passage h4.ch{font-family:'Noto Serif KR',serif; color:var(--gold); font-size:14px; font-weight:600; margin:16px 0 7px; padding-bottom:5px; border-bottom:1px solid var(--line-soft)}
  .passage h4.ch:first-child{margin-top:0}
  .verses .v{margin:0 0 6px; font-family:'Noto Serif KR',serif; font-size:14.5px; line-height:1.85}
  .verses .vn{font-family:'Cormorant Garamond',serif; color:var(--gold); font-size:12px; margin-right:6px; font-weight:600; vertical-align:1px}
  .vmiss{color:var(--muted); font-size:13px}
  .load-prompt{padding-left:8px}
  .load-prompt p{color:var(--muted); font-size:13px; margin:0 0 12px}

  label.fld{display:block; font-size:11.5px; letter-spacing:.04em; color:var(--muted); margin:0 0 6px; padding-left:8px}
  textarea,input[type=text],input[type=time]{width:calc(100% - 8px); margin-left:8px; font-family:inherit; color:var(--ink); font-size:14px; background:rgba(0,0,0,.22); border:1px solid var(--line); border-radius:11px; padding:11px 12px; resize:vertical; line-height:1.6}
  textarea:focus,input:focus{outline:none; border-color:var(--gold)}
  textarea::placeholder,input::placeholder{color:var(--muted-2)}
  textarea#med{min-height:260px}
  textarea.ai{min-height:90px; font-size:13.5px; color:#ddd6c6; line-height:1.8; resize:none; overflow:hidden}
  #bg{min-height:220px} #homily{min-height:178px}
  #verse{font-family:'Noto Serif KR',serif}

  .savebar{display:flex; align-items:center; gap:10px; margin-top:12px; padding-left:8px}
  .savebar .btn-gold{flex:1}
  .saved-flag{font-size:12px; color:var(--gold); opacity:0; transition:.3s}
  .saved-flag.show{opacity:1}

  .reminder-row{display:flex; gap:9px; align-items:flex-end; flex-wrap:wrap; padding-left:8px}
  .hint{color:var(--muted); font-size:12px; padding-left:8px; margin:8px 0 0}
  details.help summary, details.hist summary{cursor:pointer; color:var(--gold); font-size:13px; list-style:none; padding:4px 0 4px 8px; font-weight:500}
  details summary::-webkit-details-marker{display:none}
  .help-body{padding-left:8px; color:var(--muted); font-size:12.5px; line-height:1.75; margin-top:6px}
  .hist-list{margin:8px 0 0 8px; display:flex; flex-direction:column; gap:7px; max-height:220px; overflow:auto}
  .hist-item{background:rgba(0,0,0,.18); border:1px solid var(--line-soft); border-radius:10px; padding:10px 12px; cursor:pointer}
  .hist-item .hi-top{display:flex; justify-content:space-between; font-size:11px; color:var(--muted)}
  .hist-item .hi-read{font-family:'Noto Serif KR',serif; font-size:13px; margin:2px 0 3px}
  .hist-item .hi-med{font-size:12px; color:var(--muted); display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}

  .foot{color:var(--muted-2); font-size:11px; text-align:center; margin-top:20px; line-height:1.7}
  .loading{color:var(--muted); text-align:center; padding:60px 0}
  @media (max-width:900px){
    .top-bar{grid-template-columns:1fr}
    .top-center{order:1; flex-direction:row; justify-content:flex-start; gap:14px; text-align:left}
    .top-meta{text-align:left}
    .mini-cal{order:2}
    .top-index{order:3}
    .grid{grid-template-columns:1fr}
    .passage{max-height:62vh}
  }
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div id="app"><div class="loading">노트를 펼치는 중…</div></div>
<input type="file" id="filein" accept=".txt,text/plain" style="display:none">
<input type="file" id="backupin" accept=".json,application/json" style="display:none">

<script>
(function(){
  "use strict";
  const BOOKS=[["창세기",50],["탈출기",40],["레위기",27],["민수기",36],["신명기",34],
    ["여호수아기",24],["판관기",21],["룻기",4],["사무엘기 상권",31],["사무엘기 하권",24],
    ["열왕기 상권",22],["열왕기 하권",25],["역대기 상권",29],["역대기 하권",36],["에즈라기",10],
    ["느헤미야기",13],["토빗기",14],["유딧기",16],["에스테르기",10],["마카베오기 상권",16],
    ["마카베오기 하권",15],["욥기",42],["시편",150],["잠언",31],["코헬렛",12],["아가",8],
    ["지혜서",19],["집회서",51],["이사야서",66],["예레미야서",52],["애가",5],["바룩서",6],
    ["에제키엘서",48],["다니엘서",14],["호세아서",14],["요엘서",4],["아모스서",9],["오바드야서",1],
    ["요나서",4],["미카서",7],["나훔서",3],["하바쿡서",3],["스바니야서",3],["하까이서",2],
    ["즈카르야서",14],["말라키서",3],["마태오 복음서",28],["마르코 복음서",16],["루카 복음서",24],
    ["요한 복음서",21],["사도행전",28],["로마서",16],["코린토 1서",16],["코린토 2서",13],
    ["갈라티아서",6],["에페소서",6],["필리피서",4],["콜로새서",4],["테살로니카 1서",5],
    ["테살로니카 2서",3],["티모테오 1서",6],["티모테오 2서",4],["티토서",3],["필레몬서",1],
    ["히브리서",13],["야고보서",5],["베드로 1서",5],["베드로 2서",3],["요한 1서",5],
    ["요한 2서",1],["요한 3서",1],["유다서",1],["요한 묵시록",22]];

  const flat=[]; BOOKS.forEach((bc,bi)=>{for(let c=1;c<=bc[1];c++) flat.push([bi,c]);});
  const DAYS=365;

  function buildPlan(w){
    if(!w){
      // 절 수 정보 없을 때: 장 수 기준 균등 분배 (fallback)
      const base=Math.floor(flat.length/DAYS), rem=flat.length%DAYS;
      const pl=[]; let p=0;
      for(let d=0;d<DAYS;d++){const cnt=base+(d<rem?1:0); pl.push(flat.slice(p,p+cnt)); p+=cnt;}
      return pl;
    }
    // 절 수 기준 균등 분배
    const totalV=flat.reduce((s,[bi,c])=>s+((w[bi]&&w[bi][c])||20),0);
    const target=totalV/DAYS;
    const pl=[]; let sl=[],sv=0;
    for(let i=0;i<flat.length;i++){
      const [bi,c]=flat[i], v=(w[bi]&&w[bi][c])||20;
      sl.push([bi,c]); sv+=v;
      const remCh=flat.length-i-1, dl=DAYS-pl.length-1;
      if(sv>=target&&pl.length<DAYS-1&&remCh>=dl){pl.push(sl);sl=[];sv=0;}
    }
    if(sl.length) pl.length<DAYS?pl.push(sl):(pl[DAYS-1]=[...pl[DAYS-1],...sl]);
    while(pl.length<DAYS) pl.push([]);
    return pl;
  }

  let plan=buildPlan(null); // init 이후 절 수 로드되면 재빌드
  function fmt(slice){const g=[]; slice.forEach(([bi,c])=>{const last=g[g.length-1];
    if(last&&last.bi===bi&&c===last.e+1) last.e=c; else g.push({bi,s:c,e:c});});
    return g.map(x=>BOOKS[x.bi][0]+(x.s===x.e?` ${x.s}장`:` ${x.s}–${x.e}장`)).join(" · ");}
  function fmtShort(slice){const g=[]; slice.forEach(([bi,c])=>{const last=g[g.length-1];
    if(last&&last.bi===bi&&c===last.e+1) last.e=c; else g.push({bi,s:c,e:c});});
    const abbr=n=>n.replace('기','').replace('서','').replace('행전','행').slice(0,3);
    return g.map(x=>abbr(BOOKS[x.bi][0])+(x.s===x.e?` ${x.s}`:` ${x.s}-${x.e}`)).join('·');}
  const esc=s=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

  // ---- localStorage (안전 래퍼) ----
  let canStore=true;
  function lg(k){try{const v=localStorage.getItem(k); return v?JSON.parse(v):null;}catch(e){return null;}}
  function ls(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){canStore=false;}}
  // 성경 본문은 용량이 커서 IndexedDB에 저장 (localStorage 한도 초과 방지)
  function idbOpen(){return new Promise((res,rej)=>{ if(!window.indexedDB) return rej("no-idb");
    const r=indexedDB.open("tongdok_db",1);
    r.onupgradeneeded=()=>{ if(!r.result.objectStoreNames.contains("kv")) r.result.createObjectStore("kv"); };
    r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); });}
  async function idbGet(k){ try{ const db=await idbOpen(); return await new Promise((res,rej)=>{ const t=db.transaction("kv","readonly").objectStore("kv").get(k); t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error); }); }catch(e){ return null; } }
  async function idbSet(k,v){ try{ const db=await idbOpen(); await new Promise((res,rej)=>{ const t=db.transaction("kv","readwrite").objectStore("kv").put(v,k); t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); return true; }catch(e){ return false; } }

  // ---- 성경 파일 (기기에만 보관) ----
  let fileBooks=null, bibleSession=false;
  function parseBible(text){
    const lines=text.split(/\r?\n/), re=/^(\S+)\s+(\d+)\s*:\s*(\d+)\s+([\s\S]*)$/;
    const order=[], map={}; let last=null;
    for(const ln of lines){ if(!ln.trim()) continue;
      const m=re.exec(ln);
      if(!m){ if(last) last.t+=" "+ln.trim(); continue; }
      const ab=m[1], ch=+m[2], vs=+m[3], t=m[4].trim();
      if(!map[ab]){ map[ab]={chapters:{}}; order.push(ab); }
      if(!map[ab].chapters[ch]) map[ab].chapters[ch]=[];
      const o={v:vs,t}; map[ab].chapters[ch].push(o); last=o;
    }
    return order.map(a=>map[a]);
  }
  async function readFile(file){
    const buf=await file.arrayBuffer();
    let text=""; try{ text=new TextDecoder('euc-kr').decode(buf);}catch(e){}
    if((text.match(/[가-힣]/g)||[]).length<50){ try{ text=new TextDecoder('utf-8').decode(buf);}catch(e){} }
    fileBooks=parseBible(text);
    const ok=await idbSet("bible", text);  // 기기에 저장 (개인 소장본)
    bibleSession=!ok;                      // 저장 실패 시 이번 세션만 유지
    // 장별 절 수 계산 → 절 수 기준 plan 재빌드
    const w={};
    fileBooks.forEach((bk,bi)=>{ w[bi]={}; Object.entries(bk.chapters).forEach(([ch,vs])=>{ w[bi][+ch]=vs.length; }); });
    ls('tg_plan_w', w);
    plan=buildPlan(w);
  }

  // ---- 상태 ----
  const SK="tg_state", EK="tg_entries", NK="tg_notes", AK="tg_ai";
  let state={reminderTime:"22:00",completed:[],startDate:null,completedDates:{},claudeApiKey:""}, entries={}, notes={}, aiCache={};
  let viewDay=1;
  const toDateStr=d=>new Date(d.getTime()+9*60*60*1000).toISOString().slice(0,10);
  const isDone=d=>state.completed.includes(d);
  const currentDay=()=>{for(let d=1;d<=DAYS;d++) if(!isDone(d)) return d; return DAYS;};

  // ---- 백업 / 복원 ----
  function downloadBackup(){
    const payload={app:"bam-tongdok",version:1,exportedAt:new Date().toISOString(),state,entries,notes};
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
    const yyyymmdd=toDateStr(new Date()).replace(/-/g,"");
    const a=document.createElement("a"); a.href=URL.createObjectURL(blob);
    a.download=`bam-tongdok-backup-${yyyymmdd}.json`; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  }

  function mergeBackup(raw){
    let parsed;
    try{ parsed=JSON.parse(raw); }catch(e){ alert("파일을 읽지 못했어요. JSON 형식인지 확인해 주세요."); return; }
    if(parsed.app!=="bam-tongdok"||!parsed.version){ alert("밤의 통독 백업 파일이 아니에요."); return; }
    const ok=confirm("현재 기록과 합칠까요?\n(두 기기의 진도·묵상이 모두 보존됩니다)");
    if(!ok) return;
    const bs=parsed.state||{}, be=parsed.entries||{}, bn=parsed.notes||{};
    // completed 합집합
    const merged=new Set([...state.completed,...(bs.completed||[])]);
    state.completed=[...merged].sort((a,b)=>a-b);
    // completedDates 병합: 충돌 시 더 이른 날짜 유지
    const bcd=bs.completedDates||{};
    Object.keys(bcd).forEach(k=>{
      if(!state.completedDates[k]||bcd[k]<state.completedDates[k]) state.completedDates[k]=bcd[k];
    });
    // startDate: 더 이른 쪽
    if(bs.startDate&&(!state.startDate||bs.startDate<state.startDate)) state.startDate=bs.startDate;
    ls(SK,state);
    // entries 병합: savedAt 기준 최신
    Object.keys(be).forEach(k=>{
      if(!entries[k]||(be[k].savedAt&&(!entries[k].savedAt||be[k].savedAt>entries[k].savedAt))) entries[k]=be[k];
    });
    ls(EK,entries);
    // notes 병합: entries savedAt 기준 최신 (notes에 savedAt 없으므로 entries 기준)
    Object.keys(bn).forEach(k=>{
      if(!notes[k]||(entries[k]&&be[k]&&be[k].savedAt&&(!entries[k].savedAt||be[k].savedAt>=entries[k].savedAt))) notes[k]=bn[k];
    });
    ls(NK,notes);
    render();
    alert("복원 완료! 진도와 묵상이 합쳐졌어요.");
  }

  const backupin=document.getElementById("backupin");
  backupin.onchange=ev=>{
    const f=ev.target.files[0]; if(!f) return;
    const reader=new FileReader(); reader.onload=e=>mergeBackup(e.target.result); reader.readAsText(f);
    backupin.value="";
  };

  function downloadICS(){
    const [hh,mm]=state.reminderTime.split(":"); const t=new Date();
    const dt=`${t.getFullYear()}${String(t.getMonth()+1).padStart(2,"0")}${String(t.getDate()).padStart(2,"0")}`;
    const ics=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//tongdok//KO","BEGIN:VEVENT",
      "UID:tongdok-"+Date.now()+"@local",`DTSTART;TZID=Asia/Seoul:${dt}T${hh}${mm}00`,
      "RRULE:FREQ=DAILY","SUMMARY:성경 통독 · 오늘의 말씀","DESCRIPTION:오늘의 통독 본문을 읽고 묵상을 기록하세요.",
      "BEGIN:VALARM","TRIGGER:PT0M","ACTION:DISPLAY","DESCRIPTION:성경 통독","END:VALARM",
      "END:VEVENT","END:VCALENDAR"].join("\r\n");
    const a=document.createElement("a"); a.href=URL.createObjectURL(new Blob([ics],{type:"text/calendar"}));
    a.download="성경통독_매일알림.ics"; document.body.appendChild(a); a.click(); a.remove();
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  }

  // ---- 정확성 지침 프롬프트 + Claude 새 대화 열기 ----
  function basePrompt(ref){
    return `[가톨릭 성경 통독 도우미 · 정확성 지침]
저는 가톨릭 신자로, 창세기부터 순차로 성경을 1년 통독 중이며 매일 밤 본문을 읽고 배경지식과 강론을 함께 봅니다. 다음 원칙을 지켜 답해 주세요.
1) 가톨릭 교회의 가르침에 충실할 것. 사적 해석이나 다른 교파의 관점을 가톨릭 교리처럼 말하지 말 것.
2) 근거는 권위 있는 자료에 둘 것 — 「가톨릭교회 교리서(CCC)」(가능하면 항 번호), 한국천주교주교회의 「성경」과 주해, 교부 문헌, 교도권 문헌(공의회·회칙), 「매일미사」 묵상. 확실하지 않으면 모른다고 말하고, 사제나 본당에 확인하도록 권할 것.
3) 인용·항 번호·출처를 지어내지 말 것. 불확실하면 웹 검색으로 확인하고, 확인되지 않으면 표기하지 말 것.
4) 교회가 확정한 교리와, 신학적 의견·해석의 여지가 있는 부분을 구분해 줄 것.
5) 답은 간결하게 핵심 키워드 중심으로. 성경 본문을 길게 그대로 옮기지 말고 장·절로 안내할 것.
오늘 읽는 범위: ${ref}`;
  }
  function openClaude(){ try{ window.open("https://claude.ai/new","_blank"); }catch(e){ location.href="https://claude.ai/new"; } }
  function copyAndOpen(text){
    const flag=$("copyflag");
    const after=()=>{ if(flag){flag.classList.add("show"); setTimeout(()=>flag.classList.remove("show"),5000);} setTimeout(openClaude,200); };
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(after).catch(()=>{ window.prompt("이 프롬프트를 복사한 뒤 Claude 새 대화에 붙여넣으세요:",text); openClaude(); });
    } else { window.prompt("이 프롬프트를 복사한 뒤 Claude 새 대화에 붙여넣으세요:",text); openClaude(); }
  }

  // ---- Claude API 자동 받기 (Vercel /api/claude 중계) ----
  let aiFetching = new Set();
  async function fetchDayAI(d) {
    if (aiFetching.has(d) || aiCache[d]) return;
    aiFetching.add(d);
    const bgEl = document.getElementById("bg"), hmEl = document.getElementById("homily");
    if (bgEl && !bgEl.value) bgEl.placeholder = "AI가 배경지식을 가져오는 중…";
    if (hmEl && !hmEl.value) hmEl.placeholder = "AI가 강론을 가져오는 중…";
    const ref = fmt(plan[d - 1]);
    const prompt = basePrompt(ref) + `

위 지침에 따라 오늘 범위에 대해 아래 두 섹션을 반드시 모두 작성해 주세요. 각 섹션 제목([배경지식], [강론·해설])은 반드시 대괄호 그대로 유지해 주세요.

[배경지식]
오늘 본문을 신학적으로 깊이 탐구하되, 중학생도 바로 이해할 수 있는 말로 써 주세요. 4-5문단 분량의 자연스러운 글로 작성해 주세요 (헤더나 기호 없이 흐르는 문장으로).
다음 내용 중 오늘 본문에 중요한 것을 골라 녹여 주세요.
- 이 본문의 문학 장르와 가톨릭 교회가 어떻게 읽도록 가르치는지
- 핵심 신학 개념 1-2가지 (전문 용어는 반드시 괄호 안에 쉬운 말로 바로 풀어서. 예: 예형론(구약 사건이 예수님을 미리 가리키는 것))
- CCC(가톨릭교회 교리서) 관련 항 번호가 있으면 자연스럽게 언급
- 구원 역사의 큰 흐름 속에서 이 본문이 어디에 있는지, 신약·예수님과 어떻게 연결되는지
- 현대인이 어렵거나 불편하게 느낄 수 있는 부분이 있다면 교회의 해석 관점과 함께 솔직하게

[강론·해설]
매일미사 강론과 오늘의 묵상 자료를 참고하여 3-4문단의 자연스러운 글로 작성해 주세요 (헤더나 기호 없이).
- 오늘 본문이 전하는 핵심 메시지 한 가지를 중심으로
- 이 말씀이 지금 내 일상·관계·신앙에 어떻게 닿는지 구체적으로
- 실천할 수 있는 작은 권고나 기도 방향
→ 사제가 강론하듯 따뜻하고 친근한 말투로, 위로와 도전이 함께 담기도록.`;
    try {
      const res = await fetch("/api/claude", {
        method: "POST",
        headers: { "content-type": "application/json", "x-app-pin": sessionStorage.getItem('tg_pin') || '' },
        body: JSON.stringify({
          model: "claude-sonnet-4-6",
          max_tokens: 3500,
          messages: [{ role: "user", content: prompt }]
        })
      });
      if (!res.ok) { const err = await res.json(); console.error("Claude API:", err); if (res.status === 401) { sessionStorage.clear(); location.reload(); } aiFetching.delete(d); return; }
      const data = await res.json();
      const text = (data.content && data.content[0] && data.content[0].text) || "";
      const bgMatch = text.match(/\[배경지식\][^\n]*\n([\s\S]*?)(?=\[강론|$)/);
      const hmMatch = text.match(/\[강론[^\]]*\][^\n]*\n([\s\S]*?)$/);
      const bg = bgMatch ? bgMatch[1].trim() : text;
      const homily = hmMatch ? hmMatch[1].trim() : "";
      aiCache[d] = { bg, homily, fetchedAt: toDateStr(new Date()) };
      ls(AK, aiCache);
      if (!notes[d]) notes[d] = { bg: "", homily: "" };
      if (!notes[d].bg) { notes[d].bg = bg; ls(NK, notes); }
      if (!notes[d].homily) { notes[d].homily = homily; ls(NK, notes); }
      if (viewDay === d) {
        const bgEl2 = document.getElementById("bg"), hmEl2 = document.getElementById("homily");
        if (bgEl2 && !bgEl2.value) { bgEl2.value = bg; bgEl2.placeholder = "배경지식"; autoResize(bgEl2); }
        if (hmEl2 && !hmEl2.value) { hmEl2.value = homily; hmEl2.placeholder = "강론·해설"; autoResize(hmEl2); }
      }

  function miniCalHTML(){

    const today=toDateStr(new Date());
    const startDate=state.startDate||today;
    const firstDow=new Date(calYear,calMonth,1).getDay();
    const lastDate=new Date(calYear,calMonth+1,0).getDate();
    const startY=+startDate.slice(0,4), startM=+startDate.slice(5,7)-1;
    const todayY=new Date().getFullYear(), todayM=new Date().getMonth();
    const canPrev=calYear>startY||(calYear===startY&&calMonth>startM);
    const canNext=calYear<todayY||(calYear===todayY&&calMonth<todayM);
    const DOW=['일','월','화','수','목','금','토'];
    const MNAMES=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    let cells='';
    for(let i=0;i<firstDow;i++) cells+='<div class="mcc me"></div>';
    for(let day=1;day<=lastDate;day++){
      const ds=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const dn=dateToDay[ds];
      const isMissed=ds>=startDate&&ds<today&&!dn;
      const cls='mcc'+(ds===today?' mt':'')+(dn?' md':isMissed?' mm':'');
      const inner=dn?`<span class="mday">${day}</span><span class="mref">${fmtShort(plan[dn-1])}</span>`
        :isMissed?`<span class="mday">${day}</span><div class="mdot"></div>`
        :`<span class="mday">${day}</span>`;
      cells+=`<div class="${cls}"${dn?` data-dn="${dn}"`:''}>${inner}</div>`;
    }
    return `<div class="mini-cal">
      <div class="mini-cal-nav">
        <button class="btn btn-sm" id="calPrev" ${!canPrev?'disabled':''}>←</button>
        <span class="mini-cal-title">${calYear}년 ${MNAMES[calMonth]}</span>

  function searchBible(q){
    if(!fileBooks||q.length<2) return [];
    const ql=q.toLowerCase(); const hits=[];
    for(let bi=0;bi<BOOKS.length;bi++){
      const fb=fileBooks[bi]; if(!fb) continue;
      for(const ch in fb.chapters){
        for(const v of fb.chapters[ch]){
          if(v.t.toLowerCase().includes(ql)){
            hits.push({bi,ch:+ch,v:v.v,t:v.t});
            if(hits.length>=25) return hits;
          }
        }
      }
    }
    return hits;
  }

  function bind(d){
    $("loadBtn").onclick=pickFile; if($("loadBtn2")) $("loadBtn2").onclick=pickFile;
    $("icsBtn").onclick=downloadICS; if($("icsBtn2")) $("icsBtn2").onclick=downloadICS;
    if($("exportBtn")) $("exportBtn").onclick=downloadBackup;
    if($("importBtn")) $("importBtn").onclick=()=>backupin.click();
    $("prev").onclick=()=>{if(d>1){viewDay=d-1;render();}};
    $("next").onclick=()=>{if(d<DAYS){viewDay=d+1;render();}};
    $("today").onclick=()=>{viewDay=currentDay();render();};
    // 미니 달력 이전/다음 월
    if($("calPrev")) $("calPrev").onclick=()=>{if(calMonth===0){calYear--;calMonth=11;}else calMonth--; render();};
    if($("calNext")) $("calNext").onclick=()=>{if(calMonth===11){calYear++;calMonth=0;}else calMonth++; render();};
    // 달력 셀 클릭
    app.querySelectorAll('.mcc[data-dn]').forEach(el=>{
      el.onclick=()=>{viewDay=+el.dataset.dn; render(); window.scrollTo({top:0,behavior:'smooth'});};
    });
    // 우측 인덱스 드롭다운
    if($("tidxBook")) $("tidxBook").onchange=ev=>{idxBook=+ev.target.value; idxChapter=1; render();};
    // 우측 장 선택
    app.querySelectorAll('.tidx-ch').forEach(btn=>{
      btn.onclick=()=>{idxChapter=+btn.dataset.ch; indexMode=true; renderIndex();};
    });
    // 본문 검색
    let srchTimer=null;
    if($("bibleSearch")) $("bibleSearch").oninput=ev=>{
      clearTimeout(srchTimer);
      srchTimer=setTimeout(()=>{
        const q=ev.target.value.trim();
        const box=$("srchResults"); if(!box) return;
        if(q.length<2){ box.innerHTML=''; return; }
        if(!fileBooks){ box.innerHTML='<p style="font-size:12px;color:var(--muted);padding:4px 0">성경 파일을 먼저 불러오세요.</p>'; return; }
        const hits=searchBible(q);
        if(!hits.length){ box.innerHTML='<p style="font-size:12px;color:var(--muted);padding:4px 0">검색 결과가 없어요.</p>'; return; }
        box.innerHTML=hits.map((h,i)=>{
          const ref=`${BOOKS[h.bi][0]} ${h.ch},${h.v}`;
          const ql=q.toLowerCase(), tl=h.t.toLowerCase(), idx=tl.indexOf(ql);
          const snip=idx===-1?h.t:h.t.slice(Math.max(0,idx-20),idx+q.length+40);
          const hiSnip=snip.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'),m=>`<b style="color:var(--gold-bright)">${m}</b>`);
          return `<div class="srch-hit" data-i="${i}"><div class="srch-ref">${ref}</div><div class="srch-txt">${hiSnip}</div></div>`;
        }).join('');
        box.querySelectorAll('.srch-hit').forEach((el,i)=>{
          el.onclick=()=>{idxBook=hits[i].bi; idxChapter=hits[i].ch; indexMode=true; renderIndex();};
        });
      },250);
    };

    const ref=fmt(plan[d-1]);
    if($("askMore")) $("askMore").onclick=()=>copyAndOpen(basePrompt(ref));
    $("rtime").onchange=ev=>{state.reminderTime=ev.target.value; ls(SK,state);};

    const saveNotes=()=>{ notes[d]={bg:$("bg").value, homily:$("homily").value}; ls(NK,notes); };
    window._saveNotes = saveNotes;
    $("bg").onblur=saveNotes; $("homily").onblur=saveNotes;
    [$("bg"),$("homily")].forEach(el=>{ if(!el) return; autoResize(el); el.oninput=()=>autoResize(el); });

    $("save").onclick=()=>{
      entries[d]={med:$("med").value, verse:$("verse").value, savedAt:new Date().toISOString()};
      ls(EK,entries);
      notes[d]={bg:$("bg").value, homily:$("homily").value}; ls(NK,notes);
      if(!isDone(d)){state.completed.push(d); state.completedDates[d]=toDateStr(new Date()); ls(SK,state);}
      const fl=$("flag"); fl.classList.add("show"); setTimeout(()=>fl.classList.remove("show"),1500);
      if(viewDay===d) viewDay=isDone(d)?d:currentDay(); render();
    };
    if($("undo")) $("undo").onclick=()=>{state.completed=state.completed.filter(x=>x!==d); delete state.completedDates[d]; ls(SK,state); render();};
    maybeAutoFetch(d);
  }

  function renderHist(){
    const box=$("histlist"); if(!box) return;
    const days=Object.keys(entries).map(Number).sort((a,b)=>b-a);
    if(!days.length){ box.innerHTML='<div class="hint" style="padding-left:0">아직 기록이 없어요. 오늘 첫 묵상을 남겨 보세요.</div>'; return; }
    box.innerHTML=days.map(dn=>{const en=entries[dn];
      const dt=en.savedAt?new Date(en.savedAt).toLocaleDateString('ko-KR',{month:'long',day:'numeric'}):'';
      return `<div class="hist-item" data-d="${dn}"><div class="hi-top"><span>DAY ${dn}</span><span>${dt}</span></div>
        <div class="hi-read">${fmt(plan[dn-1])}</div><div class="hi-med">${esc(en.med||en.verse||'(기록 없음)')}</div></div>`;}).join("");
    box.querySelectorAll(".hist-item").forEach(el=>el.onclick=()=>{viewDay=+el.dataset.d; render(); window.scrollTo({top:0,behavior:'smooth'});});
  }

    overlay.innerHTML = `<div style="color:#c9b96e;font-size:22px;font-weight:700">🕯 밤의 통독</div>
      <div style="color:#aaa;font-size:14px">PIN을 입력해 주세요</div>
      <input id="pinInput" type="password" inputmode="numeric" maxlength="8" style="font-size:24px;text-align:center;width:140px;padding:10px;border-radius:10px;border:1px solid #3a3a5a;background:#1a1c2e;color:#fff;letter-spacing:6px" placeholder="••••">
      <div id="pinErr" style="color:#e07a5f;font-size:13px;min-height:18px"></div>`;
    document.body.appendChild(overlay);
    const inp = overlay.querySelector('#pinInput');
    inp.focus();
    let checking = false;
    async function tryPin() {
      if (checking || inp.value.length < 4) return;
      checking = true;
      try {
        const r = await fetch('/api/verify-pin', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ pin: inp.value })
        });
        const data = await r.json();
        if (data.ok) {
          sessionStorage.setItem('tg_pin_ok', '1');
          sessionStorage.setItem('tg_pin', inp.value);
          overlay.remove();
        } else {
          overlay.querySelector('#pinErr').textContent = '핀 번호가 틀렸어요';
          inp.value = '';
          checking = false;
        }
      } catch(e) {
        overlay.querySelector('#pinErr').textContent = '오류가 발생했어요. 다시 시도해 주세요.';
        inp.value = '';
        checking = false;
      }
    }
    inp.addEventListener('keydown', e => { if (e.key === 'Enter') tryPin(); });
    inp.addEventListener('input', () => { if (inp.value.length >= 4) tryPin(); });
  }

  (async function init(){
    checkPin();
    const s=lg(SK); if(s) state={...{reminderTime:"22:00",completed:[],startDate:null,completedDates:{},claudeApiKey:""},...s};
    const en=lg(EK); if(en) entries=en;
    const n=lg(NK); if(n) notes=n;
    const ai=lg(AK); if(ai) aiCache=ai;
    // 절 수 가중치 로드 → plan 재빌드 (성경 파일 불러온 이후라면)
    const pw=lg('tg_plan_w'); if(pw) plan=buildPlan(pw);
    // 마이그레이션: startDate / completedDates 필드 보강
    if(!state.startDate) state.startDate=toDateStr(new Date());
    if(!state.completedDates) state.completedDates={};
    state.completed.forEach(d=>{
      if(!state.completedDates[d]){
        const savedAt=entries[d]&&entries[d].savedAt;
        state.completedDates[d]=savedAt?savedAt.slice(0,10):state.startDate;
      }
    });
    ls(SK,state);
    viewDay=currentDay(); render();              // 먼저 화면을 그리고
    try{ const raw=await idbGet("bible");         // 저장해 둔 본문을 불러와 다시 그림
      if(raw){
        fileBooks=parseBible(raw);
        // 절 수 가중치가 없으면 재계산 (localStorage.clear() 후 복구)
        if(!lg('tg_plan_w')){
          const w={};
          fileBooks.forEach((bk,bi)=>{ w[bi]={}; Object.entries(bk.chapters).forEach(([ch,vs])=>{ w[bi][+ch]=vs.length; }); });
          ls('tg_plan_w',w); plan=buildPlan(w);
        }
        render();
      }
    }catch(e){}
  })();
})();
</script>
</body>
</html>
